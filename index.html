<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .active-page { display: block; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 pb-28 font-sans text-gray-900">

    <!-- ABA 1: RELATÓRIO (HOME) -->
    <div id="home" class="page active-page">
        <header class="bg-white p-6 text-center shadow-sm border-b-2 border-yellow-400">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-black">SHALON</h1>
            <p class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Painel de Relatórios</p>
        </header>

        <div class="p-5 max-w-md mx-auto space-y-6">
            <!-- CARD TOTAL GERAL -->
            <div class="bg-black text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest">Investimento Total em Manutenção</p>
                <h2 id="total-geral" class="text-4xl font-black text-yellow-400 mt-1">R$ 0,00</h2>
                <i class="fas fa-chart-line text-7xl absolute -right-4 -bottom-2 opacity-10"></i>
            </div>

            <!-- ALERTA DE VENCIMENTOS -->
            <div>
                <h3 class="text-sm font-black uppercase italic mb-3 flex items-center gap-2">
                    <i class="fas fa-exclamation-triangle text-red-500"></i> Próximos Vencimentos
                </h3>
                <div id="lista-vencimentos" class="space-y-3">
                    <!-- Avisos de vistorias vencendo aparecem aqui -->
                    <p class="text-xs text-gray-400 italic">Nenhuma vistoria vencendo nos próximos 30 dias.</p>
                </div>
            </div>

            <!-- RESUMO POR VAN -->
            <div>
                <h3 class="text-sm font-black uppercase italic mb-3">Gastos por Veículo</h3>
                <div id="resumo-por-van" class="space-y-2">
                    <!-- Resumo de cada placa aparece aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- ABA 2: FROTA -->
    <div id="frota" class="page">
        <div class="p-6">
            <h2 class="text-2xl font-black mb-6 italic uppercase flex items-center gap-2">
                <i class="fas fa-shuttle-van text-yellow-500"></i> Gerenciar Vans
            </h2>
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-50 mb-8">
                <input type="hidden" id="veiculo-id">
                <div class="space-y-3">
                    <input type="text" id="placa" placeholder="PLACA" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold uppercase">
                    <input type="text" id="descricao" placeholder="DESCRIÇÃO (Ex: Sprinter 415)" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    <input type="number" id="ano" placeholder="ANO" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    <button onclick="salvarVeiculo()" id="btn-salvar-veiculo" class="w-full bg-black text-yellow-400 p-4 rounded-xl font-black shadow-lg uppercase">Salvar Veículo</button>
                    <button onclick="limparFormVeiculo()" id="btn-cancelar-veiculo" class="hidden w-full bg-gray-200 text-gray-500 p-2 rounded-xl font-bold uppercase text-xs">Cancelar</button>
                </div>
            </div>
            <div id="lista-frota" class="space-y-4"></div>
        </div>
    </div>

    <!-- ABA 3: MANUTENÇÃO -->
    <div id="manutencao" class="page">
        <div class="p-6">
            <h2 class="text-2xl font-black mb-6 italic uppercase flex items-center gap-2">
                <i class="fas fa-tools text-yellow-500"></i> Registro de Serviço
            </h2>
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-50 mb-8">
                <div class="space-y-3">
                    <select id="m-placa" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold uppercase"></select>
                    <select id="m-tipo" onchange="verificarValidade()" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold italic">
                        <option value="">TIPO DE SERVIÇO</option>
                        <option value="Mecânica">Manutenção Mecânica</option>
                        <option value="Elétrica">Manutenção Elétrica</option>
                        <option value="Ar-condicionado">Manutenção Ar-condicionado</option>
                        <option value="Vistoria DER">Vistoria DER</option>
                        <option value="Vistoria ANTT">Vistoria ANTT</option>
                        <option value="Tacógrafo">Aferição de Tacógrafo</option>
                    </select>
                    <input type="text" id="m-desc" placeholder="DESCRIÇÃO DO SERVIÇO" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="m-data" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none text-xs">
                        <input type="number" id="m-valor" placeholder="VALOR R$" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold text-green-600">
                    </div>
                    <div id="campo-validade" class="hidden animate-fade">
                        <label class="text-[10px] font-black ml-2 text-red-500 uppercase italic">Data de Validade/Vencimento</label>
                        <input type="date" id="m-validade" class="w-full p-4 bg-red-50 rounded-xl border-2 border-red-200 focus:border-red-500 outline-none font-bold">
                    </div>
                    <button onclick="salvarManutencao()" class="w-full bg-black text-yellow-400 p-4 rounded-xl font-black shadow-lg uppercase active:scale-95 transition-all">Registrar Agora</button>
                </div>
            </div>
            <div id="lista-manutencao" class="space-y-4"></div>
        </div>
    </div>

    <!-- MENU INFERIOR -->
    <nav class="fixed bottom-6 left-6 right-6 bg-black text-white rounded-full flex justify-around p-4 shadow-2xl items-center z-50">
        <button onclick="showPage('home')" id="btn-home" class="text-yellow-400"><i class="fas fa-chart-bar text-xl"></i></button>
        <button onclick="showPage('frota')" id="btn-frota" class="opacity-30"><i class="fas fa-shuttle-van text-xl"></i></button>
        <button onclick="showPage('manutencao')" id="btn-manutencao" class="opacity-30"><i class="fas fa-tools text-xl"></i></button>
    </nav>

        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
