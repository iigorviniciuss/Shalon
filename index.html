<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes</title>
    <link rel="manifest" href="data:application/manifest+json,{"name":"Shalon Transportes","short_name":"Shalon","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#000000","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/1042/1042680.png","sizes":"512x512","type":"image/png"}]}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">
    <header class="bg-white p-6 text-center shadow-sm border-b-2 border-yellow-400">
        <h1 class="text-3xl font-black italic tracking-tighter">SHALON</h1>
        <p class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Transportes e Logística</p>
    </header>

    <div class="p-5 max-w-md mx-auto">
        <div class="bg-black text-white p-8 rounded-[2rem] mb-6 shadow-xl relative overflow-hidden">
            <h2 class="text-2xl font-bold italic text-yellow-400 leading-none">FROTA ATIVA</h2>
            <p class="text-[10px] opacity-50 mt-2 uppercase tracking-widest">Controle de Manutenção</p>
            <i class="fas fa-truck text-7xl absolute -right-4 -bottom-2 opacity-10"></i>
        </div>

        <button onclick="ativarAlertas()" id="btn" class="w-full bg-yellow-400 text-black p-6 rounded-2xl font-black shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all">
            <i class="fas fa-bell"></i> ATIVAR ALERTAS DE 30 DIAS
        </button>

        <div class="mt-10">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Próximos Vencimentos</h3>
            <div class="bg-white p-8 rounded-[2rem] text-center border-2 border-dashed border-gray-200">
                <p class="text-gray-400 text-sm italic">Nenhum alerta pendente hoje.</p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-black text-white rounded-full flex justify-around p-4 shadow-2xl items-center">
        <i class="fas fa-home text-yellow-400 text-xl"></i>
        <i class="fas fa-truck-moving opacity-30 text-xl"></i>
        <i class="fas fa-tools opacity-30 text-xl"></i>
        <i class="fas fa-user opacity-30 text-xl"></i>
    </nav>

    <script>
        function ativarAlertas() {
            Notification.requestPermission().then(p => {
                if(p === 'granted') {
                    alert('✅ Alertas da Shalon ativados com sucesso!');
                    const b = document.getElementById('btn');
                    b.innerHTML = 'ALERTAS ATIVOS';
                    b.className = 'w-full bg-green-600 text-white p-6 rounded-2xl font-black shadow-lg';
                }
            });
        }
    </script>
</body>
</html>
