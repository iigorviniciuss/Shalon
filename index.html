<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes</title>
    <link rel="manifest" href="data:application/manifest+json,{"name":"Shalon Transportes","short_name":"Shalon","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#000000","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/1042/1042680.png","sizes":"512x512","type":"image/png"}]}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body class="bg-gray-100 pb-24 font-sans text-gray-900">

    <!-- HOME -->
    <div id="home" class="page active-page">
        <header class="bg-white p-6 text-center shadow-sm border-b-2 border-yellow-400">
            <h1 class="text-3xl font-black italic tracking-tighter text-black uppercase">SHALON</h1>
            <p class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Transportes e Logística</p>
        </header>
        <div class="p-5 max-w-md mx-auto">
            <div class="bg-black text-white p-8 rounded-[2rem] shadow-xl relative overflow-hidden">
                <h2 class="text-2xl font-bold italic text-yellow-400 leading-none">FROTA ATIVA</h2>
                <p class="text-[10px] opacity-50 mt-2 uppercase tracking-widest">Painel Cloud Shalon</p>
                <i class="fas fa-shuttle-van text-7xl absolute -right-4 -bottom-2 opacity-10"></i>
            </div>
        </div>
    </div>

    <!-- FROTA (COM VAN) -->
    <div id="frota" class="page">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-shuttle-van text-2xl text-yellow-500"></i>
                <h2 class="text-2xl font-black italic uppercase">Gerenciar Frota</h2>
            </div>
            
            <!-- FORMULÁRIO -->
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-50 mb-8">
                <input type="hidden" id="veiculo-id">
                <div class="space-y-3">
                    <input type="text" id="placa" placeholder="PLACA" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold uppercase">
                    <input type="text" id="descricao" placeholder="DESCRIÇÃO (Ex: Van Sprinter 415)" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    <input type="number" id="ano" placeholder="ANO" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    
                    <button onclick="salvarVeiculo()" id="btn-salvar" class="w-full bg-black text-yellow-400 p-4 rounded-xl font-black shadow-lg uppercase active:scale-95 transition-all">
                        Salvar na Nuvem
                    </button>
                    <button onclick="limparForm()" id="btn-cancelar" class="hidden w-full bg-gray-200 text-gray-600 p-2 rounded-xl font-bold uppercase text-xs">
                        Cancelar Edição
                    </button>
                </div>
            </div>

            <!-- LISTA -->
            <div id="lista-frota" class="space-y-4">
                <!-- Veículos aparecem aqui -->
            </div>
        </div>
    </div>

    <!-- MANUTENÇÃO -->
    <div id="manutencao" class="page">
        <div class="p-10 text-center">
            <i class="fas fa-tools text-6xl text-gray-200 mb-4"></i>
            <h2 class="text-xl font-black uppercase italic">Manutenção</h2>
            <p class="text-gray-400 text-sm">Controle de revisões em breve.</p>
        </div>
    </div>

    <!-- MENU INFERIOR (ÍCONE DE VAN NO MEIO) -->
    <nav class="fixed bottom-6 left-6 right-6 bg-black text-white rounded-full flex justify-around p-4 shadow-2xl items-center z-50 border border-gray-800">
        <button onclick="showPage('home')" id="btn-home" class="text-yellow-400"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showPage('frota')" id="btn-frota" class="opacity-30"><i class="fas fa-shuttle-van text-xl"></i></button>
        <button onclick="showPage('manutencao')" id="btn-manutencao" class="opacity-30"><i class="fas fa-tools text-xl"></i></button>
    </nav>

    <!-- LOGICA FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCKa107xJoCB_L0W-YR66CJR9UUkt9yyQI",
          authDomain: "shalonapp-702b3.firebaseapp.com",
          projectId: "shalonapp-702b3",
          storageBucket: "shalonapp-702b3.firebasestorage.app",
          messagingSenderId: "843005158617",
          appId: "1:843005158617:web:bda693516bb45332880ac8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarVeiculo = async () => {
            const id = document.getElementById('veiculo-id').value;
            const dados = {
                placa: document.getElementById('placa').value.toUpperCase(),
                descricao: document.getElementById('descricao').value,
                ano: document.getElementById('ano').value
            };

            if(!dados.placa) return alert('A placa é obrigatória!');

            try {
                if(id) {
                    await updateDoc(doc(db, "frota", id), dados);
                } else {
                    await addDoc(collection(db, "frota"), dados);
                }
                limparForm();
                carregarFrota();
            } catch (e) { alert('Erro: ' + e); }
        }

        window.carregarFrota = async () => {
            const querySnapshot = await getDocs(collection(db, "frota"));
            const lista = document.getElementById('lista-frota');
            lista.innerHTML = '';
            querySnapshot.forEach((res) => {
                const v = res.data();
                lista.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-yellow-400 flex justify-between items-center animate-fade-in">
                        <div onclick="prepararEdicao('${res.id}', '${v.placa}', '${v.descricao}', '${v.ano}')">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${v.descricao || 'Van'} | ${v.ano || '-'}</p>
                            <p class="text-xl font-black">${v.placa}</p>
                        </div>
                        <button onclick="deletarVeiculo('${res.id}')" class="text-red-400 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>`;
            });
        }

        window.deletarVeiculo = async (id) => {
            if(confirm('Excluir esta van?')) {
                await deleteDoc(doc(db, "frota", id));
                carregarFrota();
            }
        }

        window.prepararEdicao = (id, placa, desc, ano) => {
            document.getElementById('veiculo-id').value = id;
            document.getElementById('placa').value = placa;
            document.getElementById('descricao').value = desc === 'undefined' ? '' : desc;
            document.getElementById('ano').value = ano === 'undefined' ? '' : ano;
            document.getElementById('btn-salvar').innerText = 'Atualizar';
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        window.limparForm = () => {
            document.getElementById('veiculo-id').value = '';
            document.getElementById('placa').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('ano').value = '';
            document.getElementById('btn-salvar').innerText = 'Salvar na Nuvem';
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        carregarFrota();
    </script>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => { b.classList.add('opacity-30'); b.classList.remove('text-yellow-400'); });
            const activeBtn = document.getElementById('btn-' + pageId);
            activeBtn.classList.remove('opacity-30'); activeBtn.classList.add('text-yellow-400');
        }
    </script>
</body>
</html>
