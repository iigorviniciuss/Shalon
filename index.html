<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes - Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 70px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn-primary { background: #000; color: white; padding: 10px; border-radius: 8px; text-align: center; width: 100%; display: block; font-weight: bold; }
        .badge-vencido { background: #fee2e2; color: #b91c1c; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .badge-alerta { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header com Logo -->
    <header class="bg-white p-4 text-center border-b shadow-sm sticky top-0 z-10">
        <h1 class="text-xl font-black tracking-tighter">SHALON</h1>
        <p class="text-xs font-bold text-gray-500 tracking-widest -mt-1">TRANSPORTES</p>
        <p class="text-[10px] text-gray-400 mt-1 uppercase">Controle de Manutenção</p>
    </header>

    <div id="app-content" class="p-4">
        <!-- O conteúdo das abas será injetado aqui pelo JavaScript -->
    </div>

    <!-- Navegação Inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-lg">
        <button onclick="changeTab('home')" class="text-gray-500 hover:text-black flex flex-col items-center">
            <i class="fas fa-home"></i><span class="text-[10px]">Início</span>
        </button>
        <button onclick="changeTab('veiculos')" class="text-gray-500 hover:text-black flex flex-col items-center">
            <i class="fas fa-truck"></i><span class="text-[10px]">Veículos</span>
        </button>
        <button onclick="changeTab('manutencao')" class="text-gray-500 hover:text-black flex flex-col items-center">
            <i class="fas fa-tools"></i><span class="text-[10px]">Manutenção</span>
        </button>
        <button onclick="changeTab('relatorios')" class="text-gray-500 hover:text-black flex flex-col items-center">
            <i class="fas fa-chart-line"></i><span class="text-[10px]">Relatórios</span>
        </button>
    </nav>

    <script>
        // Lógica simplificada para funcionamento no celular
        let veiculos = JSON.parse(localStorage.getItem('shalon_veiculos')) || [];
        let manutencoes = JSON.parse(localStorage.getItem('shalon_manutencoes')) || [];

        function changeTab(tab) {
            const content = document.getElementById('app-content');
            if(tab === 'home') {
                const proximos = manutencoes.filter(m => m.dataVencimento); // Lógica de 60 dias aqui
                content.innerHTML = `
                    <div class="card bg-black text-white">
                        <p class="text-sm opacity-80">Total de Veículos</p>
                        <h2 class="text-3xl font-bold">${veiculos.length}</h2>
                    </div>
                    <h3 class="font-bold mb-3">Alertas de Vencimento</h3>
                    <div class="text-center py-10 text-gray-400">Nenhum alerta para os próximos 60 dias.</div>
                `;
            } else if(tab === 'veiculos') {
                content.innerHTML = `
                    <button onclick="addVeiculo()" class="btn-primary mb-4">+ Cadastrar Veículo</button>
                    ${veiculos.map(v => `<div class="card"><p class="font-bold">${v.placa}</p><p class="text-sm">${v.modelo} (${v.ano})</p></div>`).join('')}
                `;
            } else {
                content.innerHTML = `<div class="text-center py-10">Aba ${tab} pronta para uso!</div>`;
            }
        }

        function addVeiculo() {
            const placa = prompt("Placa do Veículo:");
            if(placa) {
                veiculos.push({placa: placa.toUpperCase(), modelo: 'Modelo', ano: '2024'});
                localStorage.setItem('shalon_veiculos', JSON.stringify(veiculos));
                changeTab('veiculos');
            }
        }

        // Iniciar na Home
        changeTab('home');
    </script>
</body>
</html>
