<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .active-page { display: block; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 pb-28 font-sans text-gray-900">

    <!-- ABA 1: RELATÓRIO (HOME) -->
    <div id="home" class="page active-page">
        <header class="bg-white p-6 text-center shadow-sm border-b-2 border-yellow-400">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-black">SHALON</h1>
            <p class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Painel de Relatórios</p>
        </header>

        <div class="p-5 max-w-md mx-auto space-y-6">
            <!-- CARD TOTAL GERAL -->
            <div class="bg-black text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest">Investimento Total em Manutenção</p>
                <h2 id="total-geral" class="text-4xl font-black text-yellow-400 mt-1">R$ 0,00</h2>
                <i class="fas fa-chart-line text-7xl absolute -right-4 -bottom-2 opacity-10"></i>
            </div>

            <!-- ALERTA DE VENCIMENTOS -->
            <div>
                <h3 class="text-sm font-black uppercase italic mb-3 flex items-center gap-2">
                    <i class="fas fa-exclamation-triangle text-red-500"></i> Próximos Vencimentos
                </h3>
                <div id="lista-vencimentos" class="space-y-3">
                    <!-- Avisos de vistorias vencendo aparecem aqui -->
                    <p class="text-xs text-gray-400 italic">Nenhuma vistoria vencendo nos próximos 30 dias.</p>
                </div>
            </div>

            <!-- RESUMO POR VAN -->
            <div>
                <h3 class="text-sm font-black uppercase italic mb-3">Gastos por Veículo</h3>
                <div id="resumo-por-van" class="space-y-2">
                    <!-- Resumo de cada placa aparece aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- ABA 2: FROTA -->
    <div id="frota" class="page">
        <div class="p-6">
            <h2 class="text-2xl font-black mb-6 italic uppercase flex items-center gap-2">
                <i class="fas fa-shuttle-van text-yellow-500"></i> Gerenciar Vans
            </h2>
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-50 mb-8">
                <input type="hidden" id="veiculo-id">
                <div class="space-y-3">
                    <input type="text" id="placa" placeholder="PLACA" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold uppercase">
                    <input type="text" id="descricao" placeholder="DESCRIÇÃO (Ex: Sprinter 415)" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    <input type="number" id="ano" placeholder="ANO" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-medium">
                    <button onclick="salvarVeiculo()" id="btn-salvar-veiculo" class="w-full bg-black text-yellow-400 p-4 rounded-xl font-black shadow-lg uppercase">Salvar Veículo</button>
                    <button onclick="limparFormVeiculo()" id="btn-cancelar-veiculo" class="hidden w-full bg-gray-200 text-gray-500 p-2 rounded-xl font-bold uppercase text-xs">Cancelar</button>
                </div>
            </div>
            <div id="lista-frota" class="space-y-4"></div>
        </div>
    </div>

    <!-- ABA 3: MANUTENÇÃO -->
    <div id="manutencao" class="page">
        <div class="p-6">
            <h2 class="text-2xl font-black mb-6 italic uppercase flex items-center gap-2">
                <i class="fas fa-tools text-yellow-500"></i> Registro de Serviço
            </h2>
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-50 mb-8">
                <div class="space-y-3">
                    <select id="m-placa" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold uppercase"></select>
                    <select id="m-tipo" onchange="verificarValidade()" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold italic">
                        <option value="">TIPO DE SERVIÇO</option>
                        <option value="Mecânica">Manutenção Mecânica</option>
                        <option value="Elétrica">Manutenção Elétrica</option>
                        <option value="Ar-condicionado">Manutenção Ar-condicionado</option>
                        <option value="Vistoria DER">Vistoria DER</option>
                        <option value="Vistoria ANTT">Vistoria ANTT</option>
                        <option value="Tacógrafo">Aferição de Tacógrafo</option>
                    </select>
                    <input type="text" id="m-desc" placeholder="DESCRIÇÃO DO SERVIÇO" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="m-data" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none text-xs">
                        <input type="number" id="m-valor" placeholder="VALOR R$" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-transparent focus:border-yellow-400 outline-none font-bold text-green-600">
                    </div>
                    <div id="campo-validade" class="hidden animate-fade">
                        <label class="text-[10px] font-black ml-2 text-red-500 uppercase italic">Data de Validade/Vencimento</label>
                        <input type="date" id="m-validade" class="w-full p-4 bg-red-50 rounded-xl border-2 border-red-200 focus:border-red-500 outline-none font-bold">
                    </div>
                    <button onclick="salvarManutencao()" class="w-full bg-black text-yellow-400 p-4 rounded-xl font-black shadow-lg uppercase active:scale-95 transition-all">Registrar Agora</button>
                </div>
            </div>
            <div id="lista-manutencao" class="space-y-4"></div>
        </div>
    </div>

    <!-- MENU INFERIOR -->
    <nav class="fixed bottom-6 left-6 right-6 bg-black text-white rounded-full flex justify-around p-4 shadow-2xl items-center z-50">
        <button onclick="showPage('home')" id="btn-home" class="text-yellow-400"><i class="fas fa-chart-bar text-xl"></i></button>
        <button onclick="showPage('frota')" id="btn-frota" class="opacity-30"><i class="fas fa-shuttle-van text-xl"></i></button>
        <button onclick="showPage('manutencao')" id="btn-manutencao" class="opacity-30"><i class="fas fa-tools text-xl"></i></button>
    </nav>

    <!-- LOGICA FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKa107xJoCB_L0W-YR66CJR9UUkt9yyQI",
            authDomain: "shalonapp-702b3.firebaseapp.com",
            projectId: "shalonapp-702b3",
            storageBucket: "shalonapp-702b3.firebasestorage.app",
            messagingSenderId: "843005158617",
            appId: "1:843005158617:web:bda693516bb45332880ac8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- RELATÓRIOS (HOME) ---
        window.gerarRelatorios = async () => {
            const snap = await getDocs(collection(db, "manutencao"));
            let total = 0;
            let gastosPorVan = {};
            let hoje = new Date();
            let limiteVencimento = new Date();
            limiteVencimento.setDate(hoje.getDate() + 30);

            const listaVencimentos = document.getElementById('lista-vencimentos');
            const resumoVans = document.getElementById('resumo-por-van');
            listaVencimentos.innerHTML = '';
            resumoVans.innerHTML = '';

            snap.forEach(res => {
                const m = res.data();
                const valor = parseFloat(m.valor) || 0;
                total += valor;

                // Gastos por van
                gastosPorVan[m.placa] = (gastosPorVan[m.placa] || 0) + valor;

                // Checar vencimentos
                if (m.validade) {
                    let dataValidade = new Date(m.validade);
                    if (dataValidade <= limiteVencimento) {
                        const diasRestantes = Math.ceil((dataValidade - hoje) / (1000 * 60 * 60 * 24));
                        listaVencimentos.innerHTML += `
                            <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-lg flex justify-between items-center animate-fade">
                                <div>
                                    <p class="text-[10px] font-bold text-red-600 uppercase">${m.tipo}</p>
                                    <p class="text-sm font-black text-gray-800">${m.placa}</p>
                                </div>
                                <p class="text-xs font-bold text-red-500">${diasRestantes <= 0 ? 'VENCIDO' : 'Vence em '+diasRestantes+' dias'}</p>
                            </div>`;
                    }
                }
            });

            document.getElementById('total-geral').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            // Listar resumo por van
            for (let placa in gastosPorVan) {
                resumoVans.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50">
                        <span class="font-bold text-gray-600 uppercase text-xs">${placa}</span>
                        <span class="font-black text-black text-sm">R$ ${gastosPorVan[placa].toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>`;
            }

            if (listaVencimentos.innerHTML === '') {
                listaVencimentos.innerHTML = '<p class="text-xs text-gray-400 italic">Tudo em dia para os próximos 30 dias.</p>';
            }
        }

        // --- MANUTENÇÃO ---
        window.verificarValidade = () => {
            const tipo = document.getElementById('m-tipo').value;
            const tiposComValidade = ["Vistoria DER", "Vistoria ANTT", "Tacógrafo"];
            document.getElementById('campo-validade').classList.toggle('hidden', !tiposComValidade.includes(tipo));
        }

        window.salvarManutencao = async () => {
            const dados = {
                placa: document.getElementById('m-placa').value,
                tipo: document.getElementById('m-tipo').value,
                descricao: document.getElementById('m-desc').value,
                data: document.getElementById('m-data').value,
                valor: document.getElementById('m-valor').value,
                validade: document.getElementById('m-validade').value || null,
                timestamp: new Date()
            };
            if(!dados.placa || !dados.tipo || !dados.data) return alert('Preencha os dados!');
            try {
                await addDoc(collection(db, "manutencao"), dados);
                alert('Registrado!');
                carregarManutencoes(); gerarRelatorios();
            } catch (e) { alert(e); }
        }

        window.carregarManutencoes = async () => {
            const snap = await getDocs(query(collection(db, "manutencao"), orderBy("timestamp", "desc")));
            const lista = document.getElementById('lista-manutencao');
            lista.innerHTML = '';
            snap.forEach(res => {
                const m = res.data();
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${m.validade ? 'border-red-400' : 'border-gray-200'} animate-fade">
                        <div class="flex justify-between">
                            <p class="text-xs font-bold text-yellow-600 uppercase">${m.placa}</p>
                            <p class="text-[10px] text-gray-400">${m.data.split('-').reverse().join('/')}</p>
                        </div>
                        <p class="font-black">${m.tipo}</p>
                        <p class="text-xs text-green-600 font-bold">R$ ${m.valor}</p>
                        <button onclick="deletarManutencao('${res.id}')" class="mt-2 text-[10px] text-red-300 font-bold uppercase">Excluir</button>
                    </div>`;
            });
        }

        window.deletarManutencao = async (id) => {
            if(confirm('Excluir registro?')) {
                await deleteDoc(doc(db, "manutencao", id)); 
                carregarManutencoes(); gerarRelatorios();
            }
        }

        // --- FROTA ---
        window.salvarVeiculo = async () => {
            const id = document.getElementById('veiculo-id').value;
            const dados = { placa: document.getElementById('placa').value.toUpperCase(), descricao: document.getElementById('descricao').value, ano: document.getElementById('ano').value };
            try {
                if(id) await updateDoc(doc(db, "frota", id), dados);
                else await addDoc(collection(db, "frota"), dados);
                limparFormVeiculo(); carregarFrota();
            } catch (e) { alert(e); }
        }

        window.carregarFrota = async () => {
            const snap = await getDocs(collection(db, "frota"));
            const lista = document.getElementById('lista-frota');
            const selectM = document.getElementById('m-placa');
            lista.innerHTML = '';
            selectM.innerHTML = '<option value="">SELECIONE A PLACA</option>';
            snap.forEach(res => {
                const v = res.data();
                selectM.innerHTML += `<option value="${v.placa}">${v.placa}</option>`;
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-yellow-400 flex justify-between items-center">
                        <div><p class="text-xl font-black">${v.placa}</p></div>
                        <button onclick="deletarVeiculo('${res.id}')" class="text-red-300"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
        }

        window.deletarVeiculo = async (id) => {
            if(confirm('Excluir van?')) { await deleteDoc(doc(db, "frota", id)); carregarFrota(); }
        }

        window.limparFormVeiculo = () => {
            document.getElementById('veiculo-id').value = '';
            document.getElementById('placa').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('ano').value = '';
        }

        // INICIALIZAÇÃO
        carregarFrota();
        carregarManutencoes();
        gerarRelatorios();
    </script>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => { b.classList.add('opacity-30'); b.classList.remove('text-yellow-400'); });
            document.getElementById('btn-' + pageId).classList.remove('opacity-30');
            document.getElementById('btn-' + pageId).classList.add('text-yellow-400');
        }
    </script>
</body>
</html>
