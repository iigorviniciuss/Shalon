<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shalon Transportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">
    <header class="bg-white p-6 text-center shadow-md">
        <h1 class="text-3xl font-black tracking-tighter">SHALON</h1>
        <p class="text-sm font-bold text-gray-600 tracking-[0.3em] -mt-1">TRANSPORTES</p>
    </header>

    <div id="main-content" class="p-4"></div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-2xl">
        <button onclick="nav('home')" class="flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[10px]">Início</span></button>
        <button onclick="nav('veiculos')" class="flex flex-col items-center"><i class="fas fa-truck"></i><span class="text-[10px]">Veículos</span></button>
        <button onclick="nav('manutencao')" class="flex flex-col items-center"><i class="fas fa-tools"></i><span class="text-[10px]">Manutenção</span></button>
        <button onclick="nav('relatorios')" class="flex flex-col items-center"><i class="fas fa-chart-bar"></i><span class="text-[10px]">Relatórios</span></button>
    </nav>

    <script>
        function nav(aba) {
            const container = document.getElementById('main-content');
            if(aba === 'home') {
                container.innerHTML = `
                    <div class="bg-black text-white p-6 rounded-2xl mb-4">
                        <h2 class="text-xl font-bold">Controle Shalon</h2>
                    </div>
                    <button onclick="Notification.requestPermission()" class="w-full bg-yellow-400 p-4 rounded-xl font-bold">
                        🔔 ATIVAR ALERTAS (30 DIAS)
                    </button>
                `;
            } else {
                container.innerHTML = `<div class="p-10 text-center text-gray-400">Aba ${aba} carregada.</div>`;
            }
        }
        nav('home');
    </script>
</body>
</html>
